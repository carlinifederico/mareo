<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>MAREO - Project Planner</title>
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.webmanifest">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <span class="login-logo">MAREO</span>
      <p class="login-subtitle">Project Planner</p>
      <button id="btn-google-signin" class="login-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
      <p class="login-loading" id="login-loading" style="display:none">Loading...</p>
    </div>
  </div>

  <!-- APP (hidden until auth) -->
  <div id="app-container" style="display:none">
    <header class="toolbar">
      <div class="toolbar-left">
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu"><svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path fill="currentColor" fill-rule="evenodd" d="M3.464 20.536C4.93 22 7.286 22 12 22s7.071 0 8.535-1.465C22 19.072 22 16.714 22 12s0-7.071-1.465-8.536C19.072 2 16.714 2 12 2S4.929 2 3.464 3.464C2 4.93 2 7.286 2 12s0 7.071 1.464 8.535M18.75 16a.75.75 0 0 1-.75.75H6a.75.75 0 0 1 0-1.5h12a.75.75 0 0 1 .75.75M18 12.75a.75.75 0 0 0 0-1.5H6a.75.75 0 0 0 0 1.5zM18.75 8a.75.75 0 0 1-.75.75H6a.75.75 0 0 1 0-1.5h12a.75.75 0 0 1 .75.75" clip-rule="evenodd"/></svg></button>
        <span class="logo">MAREO</span>
        <nav class="view-tabs" id="view-tabs-nav"></nav>
      </div>
      <div class="toolbar-center">
        <div class="year-nav" id="year-nav">
          <button id="btn-prev-year" aria-label="Previous year"><svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path fill="currentColor" d="m8.165 11.63l6.63-6.43C15.21 4.799 16 5.042 16 5.57v12.86c0 .528-.79.771-1.205.37l-6.63-6.43a.5.5 0 0 1 0-.74"/></svg></button>
          <span id="current-year">2026</span>
          <button id="btn-next-year" aria-label="Next year"><svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path fill="currentColor" d="M15.835 11.63L9.205 5.2C8.79 4.799 8 5.042 8 5.57v12.86c0 .528.79.771 1.205.37l6.63-6.43a.5.5 0 0 0 0-.74"/></svg></button>
          <button id="btn-today" class="btn btn-secondary btn-today">Today</button>
          <button id="btn-reset-view" class="btn btn-secondary btn-today">Reset View</button>
          <button id="btn-edit-mode" class="btn btn-secondary btn-edit-mode" title="Toggle edit mode"><svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path fill="currentColor" fill-rule="evenodd" d="M5.25 10.055V8a6.75 6.75 0 0 1 13.5 0v2.055c1.115.083 1.84.293 2.371.824C22 11.757 22 13.172 22 16s0 4.243-.879 5.121C20.243 22 18.828 22 16 22H8c-2.828 0-4.243 0-5.121-.879C2 20.243 2 18.828 2 16s0-4.243.879-5.121c.53-.531 1.256-.741 2.371-.824M6.75 8a5.25 5.25 0 0 1 10.5 0v2.004Q16.676 9.999 16 10H8q-.677-.001-1.25.004zM14 16a2 2 0 1 1-4 0a2 2 0 0 1 4 0" clip-rule="evenodd"/></svg> LOCKED</button>
        </div>
      </div>
      <div class="toolbar-right">
        <button id="btn-undo" class="btn btn-secondary btn-undo-redo" title="Undo (Ctrl+Z)" aria-label="Undo" disabled><svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path fill="currentColor" fill-rule="evenodd" d="M7.53 3.47a.75.75 0 0 1 0 1.06L5.81 6.25h9.226c.904 0 1.633 0 2.222.053c.606.055 1.136.172 1.617.45a3.75 3.75 0 0 1 1.373 1.372c.277.481.394 1.011.449 1.617c.053.589.053 1.318.053 2.222v.072c0 .904 0 1.633-.053 2.222c-.055.606-.171 1.136-.45 1.617a3.75 3.75 0 0 1-1.372 1.373c-.481.277-1.011.394-1.617.449c-.589.053-1.318.053-2.222.053H8a.75.75 0 0 1 0-1.5h7c.948 0 1.61 0 2.122-.047c.503-.046.788-.13 1.003-.254a2.25 2.25 0 0 0 .824-.824c.124-.215.208-.5.254-1.003c.046-.512.047-1.174.047-2.122s0-1.61-.047-2.122c-.046-.503-.13-.788-.254-1.003a2.25 2.25 0 0 0-.824-.824c-.215-.124-.5-.208-1.003-.254c-.512-.046-1.174-.047-2.122-.047H5.81l1.72 1.72a.75.75 0 1 1-1.06 1.06l-3-3a.75.75 0 0 1 0-1.06l3-3a.75.75 0 0 1 1.06 0" clip-rule="evenodd"/></svg></button>
        <button id="btn-redo" class="btn btn-secondary btn-undo-redo" title="Redo (Ctrl+Y)" aria-label="Redo" disabled><svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path fill="currentColor" fill-rule="evenodd" d="M16.47 3.47a.75.75 0 0 1 1.06 0l3 3a.75.75 0 0 1 0 1.06l-3 3a.75.75 0 1 1-1.06-1.06l1.72-1.72H9c-.948 0-1.61 0-2.122.047c-.503.046-.788.13-1.003.254a2.25 2.25 0 0 0-.824.824c-.124.215-.208.5-.254 1.003c-.046.512-.047 1.174-.047 2.122s0 1.61.047 2.122c.046.502.13.788.254 1.003c.198.342.482.626.824.824c.215.124.5.208 1.003.254c.512.046 1.174.047 2.122.047h7a.75.75 0 0 1 0 1.5H8.964c-.904 0-1.633 0-2.222-.053c-.606-.055-1.136-.172-1.617-.45a3.75 3.75 0 0 1-1.373-1.372c-.277-.481-.394-1.011-.449-1.617c-.053-.589-.053-1.318-.053-2.222v-.072c0-.904 0-1.633.053-2.222c.055-.606.172-1.136.45-1.617a3.75 3.75 0 0 1 1.372-1.373c.481-.277 1.011-.394 1.617-.449c.589-.053 1.318-.053 2.222-.053h9.225l-1.72-1.72a.75.75 0 0 1 0-1.06" clip-rule="evenodd"/></svg></button>
        <button id="btn-import" class="btn btn-secondary">Import</button>
        <button id="btn-export" class="btn btn-secondary">Export</button>
        <div class="toolbar-user" id="toolbar-user">
          <img id="user-avatar" class="user-avatar" src="" alt="">
          <button id="btn-signout" class="btn btn-secondary btn-signout">Sign out</button>
        </div>
      </div>
    </header>

    <!-- VIEW: Timeline -->
    <div class="view-container active" id="view-timeline">
      <div class="gantt-container">
        <div class="sidebar">
          <div class="sidebar-header">Projects</div>
          <div class="sidebar-scroll" id="sidebar-scroll">
            <div id="sidebar-content"></div>
          </div>
        </div>
        <div class="sidebar-resize-handle" id="sidebar-resize-handle"></div>
        <div class="timeline-area" id="timeline-area">
          <div class="timeline-header-wrapper">
            <div id="timeline-header"></div>
          </div>
          <div id="gantt-body"></div>
        </div>
      </div>
    </div>

    <!-- VIEW: Board -->
    <div class="view-container" id="view-board">
      <div class="board-toolbar">
        <span class="board-zoom-info">Zoom: <span id="board-zoom-level">100%</span></span>
      </div>
      <div class="board-canvas" id="board-canvas"></div>
    </div>

    <!-- VIEW: Expenses -->
    <div class="view-container" id="view-expenses">
      <div class="expenses-body" id="expenses-body"></div>
    </div>

    <!-- VIEW: Balance -->
    <div class="view-container" id="view-balance">
      <div class="balance-body" id="balance-body"></div>
    </div>

    <!-- TODAY: floating panel (always visible across tabs) -->
    <div id="today-panel" class="today-panel"></div>

    <!-- TODAY: mobile FAB -->
    <button id="today-fab" class="today-fab" title="Open Today">
      <span class="today-fab-icon"><svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="5" fill="currentColor"/></svg></span>
      <span class="today-fab-badge"></span>
    </button>
  </div>

  <script type="module" src="js/app.js?v=23"></script>
</body>
</html>
