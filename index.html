<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>MAREO - Project Planner</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.webmanifest">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <span class="login-logo">MAREO</span>
      <p class="login-subtitle">Project Planner</p>
      <button id="btn-google-signin" class="login-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
      <p class="login-loading" id="login-loading" style="display:none">Loading...</p>
    </div>
  </div>

  <!-- APP (hidden until auth) -->
  <div id="app-container" style="display:none">
    <header class="toolbar">
      <div class="toolbar-left">
        <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
        <span class="logo">MAREO</span>
        <nav class="view-tabs" id="view-tabs-nav"></nav>
      </div>
      <div class="toolbar-center">
        <div class="year-nav" id="year-nav">
          <button id="btn-prev-year">&#9664;</button>
          <span id="current-year">2026</span>
          <button id="btn-next-year">&#9654;</button>
          <button id="btn-today" class="btn btn-secondary btn-today">Today</button>
          <button id="btn-reset-view" class="btn btn-secondary btn-today">Reset View</button>
        </div>
      </div>
      <div class="toolbar-right">
        <button id="btn-undo" class="btn btn-secondary btn-undo-redo" title="Undo (Ctrl+Z)" disabled>↩</button>
        <button id="btn-redo" class="btn btn-secondary btn-undo-redo" title="Redo (Ctrl+Y)" disabled>↪</button>
        <button id="btn-import" class="btn btn-secondary">Import</button>
        <button id="btn-export" class="btn btn-secondary">Export</button>
        <div class="toolbar-user" id="toolbar-user">
          <img id="user-avatar" class="user-avatar" src="" alt="">
          <button id="btn-signout" class="btn btn-secondary btn-signout">Sign out</button>
        </div>
      </div>
    </header>

    <!-- VIEW: Timeline -->
    <div class="view-container active" id="view-timeline">
      <div class="gantt-container">
        <div class="sidebar">
          <div class="sidebar-header">Projects</div>
          <div class="sidebar-scroll" id="sidebar-scroll">
            <div id="sidebar-content"></div>
          </div>
        </div>
        <div class="sidebar-resize-handle" id="sidebar-resize-handle"></div>
        <div class="timeline-area" id="timeline-area">
          <div class="timeline-header-wrapper">
            <div id="timeline-header"></div>
          </div>
          <div id="gantt-body"></div>
        </div>
      </div>
    </div>

    <!-- VIEW: Board -->
    <div class="view-container" id="view-board">
      <div class="board-toolbar">
        <span class="board-zoom-info">Zoom: <span id="board-zoom-level">100%</span></span>
      </div>
      <div class="board-canvas" id="board-canvas"></div>
    </div>

    <!-- VIEW: Expenses -->
    <div class="view-container" id="view-expenses">
      <div class="expenses-body" id="expenses-body"></div>
    </div>

    <!-- VIEW: Balance -->
    <div class="view-container" id="view-balance">
      <div class="balance-body" id="balance-body"></div>
    </div>

    <!-- TODAY: floating panel (always visible across tabs) -->
    <div id="today-panel" class="today-panel"></div>

    <!-- TODAY: mobile FAB -->
    <button id="today-fab" class="today-fab" title="Open Today">
      <span class="today-fab-icon">●</span>
      <span class="today-fab-badge"></span>
    </button>
  </div>

  <script type="module" src="js/app.js?v=23"></script>
</body>
</html>
